# ============================================================
# 守望先锋掉血 & 死亡 → 郊狼波形控制 配置
# Overwatch damage & death → DG-LAB waveform control configuration
# ============================================================

# ── 安全限制 / Safety limits ──────────────────────────────────────────────────
# set_strength 绝对上限, 设备范围 0~200, 此值不可超过
# Absolute upper limit for set_strength, device range 0~200, this value must not exceed
# 安全值, 修改前请确认设备可承受
# Safety value, please confirm the device can handle it before modifying
max_strength: 30

# ── DG-LAB 连接 / DG-LAB connection ──────────────────────────────────────────
channel: "A"               # 输出通道 "A" 或 "B" / Output channel "A" or "B"
ws_address: "ws://127.0.0.1:5678"      # 郊狼 WebSocket 地址 (IP改为手机能访问的本机局域网IP) / DG-LAB WebSocket address (change IP to local LAN IP accessible from phone)
ws_port: 5678              # 本地 WS 服务端口 / Local WS service port

# ── OBS 推流 / OBS streaming ─────────────────────────────────────────────────
udp_port: 1234              # MJPEG UDP 监听端口 / MJPEG UDP listen port

# ── 血量事件参数 / HP event parameters ──────────────────────────────────────
death_only: false            # 仅死亡模式: 只在死亡时触发波形, 掉血/回血/满血均不触发 / Death-only mode: only trigger on death, ignore damage/heal/full
damage_threshold: 1         # HP 下降多少才算掉血 (避免微小波动触发) / HP drop amount to count as damage (avoid triggering on minor fluctuations)
low_hp_ratio: 0.3           # HP 低于 max 的多少比例算「低血量」 / HP ratio below max considered "low HP"
damage_cooldown: 0.8        # 掉血事件冷却(秒), 冷却期内不再触发新波形 / Damage event cooldown (seconds), no new waveform triggered during cooldown
respawn_seconds: 12.0       # 复活冷却(秒), 死亡后此时间内忽略 OCR 抖动 / Respawn cooldown (seconds), ignore OCR jitter for this duration after death

# ── 强度映射 / Strength mapping ──────────────────────────────────────────────
# 掉血强度按血量比例线性映射:
# Damage strength linearly mapped by HP ratio:
#   ratio=1.0 → strength_min, ratio=0.0 → strength_max
# 死亡强度固定为 max_strength
# Death strength is fixed at max_strength
strength_min: 8             # 满血时掉血强度 / Damage strength at full HP
strength_max: 30            # 空血时掉血强度 (不应超过 max_strength) / Damage strength at zero HP (should not exceed max_strength)

# ── 波形选择 / Waveform selection ──────────────────────────────────────────
# 每个事件指定使用哪个波形 (对应下方 waves 中的 key)
# Specify which waveform to use for each event (corresponds to key in waves below)
damage_wave: "pinch"        # 掉血波形 / Damage waveform
low_hp_wave: "heartbeat"    # 低血量波形 / Low HP waveform
death_wave: "death_shock"   # 死亡波形 / Death waveform

# ── 波形定义 / Waveform definitions ──────────────────────────────────────────
# 每条 = 100ms, 格式: [[频率×4], [强度×4]]
# Each row = 100ms, format: [[frequency×4], [intensity×4]]
# 频率范围 10~240, 强度范围 0~100 (相对于 set_strength 的百分比)
# Frequency range 10~240, intensity range 0~100 (percentage relative to set_strength)
#
# 可自由添加新波形, key 即为上方选择的名称
# Feel free to add new waveforms, the key is the name used in the selection above

waves:
  # -- 掉血波形 / Damage waveforms --

  pinch:
    desc: "快速按捏, 低频短促, 依次减弱"  # Quick pinch, low frequency short bursts, gradually weakening
    data:
      - [[10, 10, 10, 10], [0, 0, 0, 0]]        # 静默 / Silence
      - [[10, 10, 10, 10], [80, 100, 80, 50]]    # 强击 / Strong hit
      - [[10, 10, 10, 10], [0, 0, 0, 0]]         # 间隔 / Gap
      - [[10, 10, 10, 10], [60, 80, 60, 40]]     # 次击 / Secondary hit
      - [[10, 10, 10, 10], [0, 0, 0, 0]]         # 间隔 / Gap
      - [[10, 10, 10, 10], [30, 50, 30, 10]]     # 弱击 / Weak hit
      - [[10, 10, 10, 10], [0, 0, 0, 0]]         # 静默 / Silence
    repeat: 1                 # 发送轮次 / Send rounds

  sharp:
    desc: "锐击, 单次强力脉冲"  # Sharp hit, single strong pulse
    data:
      - [[10, 10, 10, 10], [0, 0, 0, 0]]
      - [[10, 10, 10, 10], [100, 100, 100, 100]] # 全力一击 / Full power strike
      - [[10, 10, 10, 10], [0, 0, 0, 0]]
    repeat: 1

  rapid:
    desc: "连击, 快速三次脉冲"  # Combo, rapid triple pulse
    data:
      - [[10, 10, 10, 10], [80, 100, 80, 0]]
      - [[10, 10, 10, 10], [0, 80, 100, 80]]
      - [[10, 10, 10, 10], [80, 60, 30, 0]]
    repeat: 1

  # -- 低血量波形 / Low HP waveforms --

  heartbeat:
    desc: "心跳节奏, 缓慢起伏"  # Heartbeat rhythm, slow undulation
    data:
      - [[10, 10, 10, 10], [10, 30, 55, 75]]     # 上升 / Rise
      - [[10, 10, 10, 10], [75, 55, 30, 10]]     # 下降 / Fall
      - [[10, 10, 10, 10], [0, 0, 0, 0]]          # 静默 / Silence
      - [[10, 10, 10, 10], [0, 0, 0, 0]]          # 静默 / Silence
    repeat: 1

  slow_pulse:
    desc: "慢脉冲, 长间隔警告"  # Slow pulse, long interval warning
    data:
      - [[10, 10, 10, 10], [0, 30, 70, 90]]
      - [[10, 10, 10, 10], [90, 70, 30, 0]]
      - [[10, 10, 10, 10], [0, 0, 0, 0]]
      - [[10, 10, 10, 10], [0, 0, 0, 0]]
      - [[10, 10, 10, 10], [0, 0, 0, 0]]
    repeat: 1

  # -- 死亡波形 / Death waveforms --

  death_shock:
    desc: "死亡冲击, 高频持续+衰减"  # Death shock, high frequency sustained + decay
    data:
      - [[112, 112, 112, 112], [80, 90, 100, 90]]
      - [[112, 112, 112, 112], [90, 100, 100, 90]]
      - [[112, 112, 112, 112], [90, 95, 90, 80]]
      - [[80, 80, 80, 80],     [80, 85, 80, 70]]
      - [[60, 60, 60, 60],     [70, 65, 55, 45]]
      - [[40, 40, 40, 40],     [40, 30, 20, 10]]
      - [[20, 20, 20, 20],     [10, 5, 0, 0]]
      - [[10, 10, 10, 10],     [0, 0, 0, 0]]
      - [[10, 10, 10, 10],     [0, 0, 0, 0]]
      - [[10, 10, 10, 10],     [0, 0, 0, 0]]
    repeat: 3                 # 3轮 = 3s / 3 rounds = 3s

  death_crush:
    desc: "死亡压缩, 高频持续不减"  # Death crush, high frequency sustained without decay
    data:
      - [[112, 112, 112, 112], [100, 100, 100, 100]]
      - [[112, 112, 112, 112], [100, 100, 100, 100]]
      - [[112, 112, 112, 112], [100, 100, 100, 100]]
      - [[112, 112, 112, 112], [100, 100, 100, 100]]
      - [[112, 112, 112, 112], [100, 100, 100, 100]]
      - [[112, 112, 112, 112], [100, 100, 100, 100]]
      - [[60, 60, 60, 60],     [80, 60, 40, 20]]
      - [[10, 10, 10, 10],     [0, 0, 0, 0]]
      - [[10, 10, 10, 10],     [0, 0, 0, 0]]
    repeat: 2                 # 2轮 = 1.8s / 2 rounds = 1.8s

  death_fade:
    desc: "死亡渐弱, 从强到弱缓慢消退"  # Death fade, slowly fading from strong to weak
    data:
      - [[80, 80, 80, 80],     [100, 100, 100, 100]]
      - [[80, 80, 80, 80],     [90, 90, 90, 90]]
      - [[60, 60, 60, 60],     [80, 80, 80, 80]]
      - [[60, 60, 60, 60],     [70, 70, 70, 70]]
      - [[40, 40, 40, 40],     [60, 60, 60, 60]]
      - [[40, 40, 40, 40],     [50, 50, 50, 50]]
      - [[20, 20, 20, 20],     [30, 30, 30, 30]]
      - [[20, 20, 20, 20],     [20, 20, 20, 20]]
      - [[10, 10, 10, 10],     [10, 10, 10, 10]]
      - [[10, 10, 10, 10],     [0, 0, 0, 0]]
    repeat: 2
